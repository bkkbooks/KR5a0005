front:
  text: 太上無極總真文昌大洞仙經卷之一荒一
  hash: sha256:030f94ce7e0fac79d0532466592e6a4ae778fcc2d5d616178f3b4843673a8a3c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0005_HFL_001-001a, image: hfl/0016/0016-004.png}
body:
  text: 九天開化主宰澄真正觀寶光慈應更生永命天尊序甘山摩維洞主太玄無上上德真君校正豫之居事畎澮忽於鋤下得一金像詢之父老曰乃元始天王相昔夏禹理水冶金為像以鎮方嶽豫香火奉祀未嘗少懈因海風翻浪人力不可支豫為衆捨金像投駭浪中由是風潮遂回一境獲安思憶之久一夕沙磧中有光亘天掘之再得舊像歸築宫安奉同邦人共事之積年靈感不可勝紀豫考妣不幸死於瘟疫豫葬廬墓培壅周隅有三神人乃真定光欎羅翹光妙音三真人葛巾羽褐芒鞋訪豫以大洞經一帙賜豫曰晨夕誦之必獲善果於三才中上可以資奉父母祖族魂靈出離幽苦中可以滅罪消災延年益福下可以庇族救人同獲保全汝可捨金寶拜吾三人吾為奏傳豫即日依命設齊貢金繒奉師受之爾後晨夕持誦不輟屢獲靈感因盛暑洪水奫浸考妣墳墓豫禮奉金像誦大洞經期以千卷為終以保無虞次年秋雨霖霪傍溪湧漲數流為一豫益恐及水落視之則墳前溪谷變成堅甬廣一里餘自是松楸無害豫嘗思父毋死於疫疾恨瘟鬼之害切骨為讎幽明路殊力不能報每旦夕勤誦大洞仙經䖍懇金像願賜威力以治瘟鬼又三年忽夢金像語豫曰大洞仙經汝熟記矣大洞法籙爾未見也今當授汝以治邪魔非惟可以契汝初心亦可以佐天行化助國救民也袖中出書二件豫百拜受之一曰大洞籙二曰大洞法既覺此二書在枕前因設齊置匭收貯擇日出而閲之讀至大洞天騶甲卒一萬人下度之句忽風雷晝暝金甲朱綬者無數列於豫前俯而請命一人執紅旗立於衆先曰願聽使令豫方恍惚不覺厲聲謂之曰吾要汝等往治瘟鬼此鄉某家合門病瘟為吾驅來語畢一持旗者領百餘人入其家俄頃執鬼使五人而出有䝉虎皮者冠雞雄者貌若人者苦鳥鴉者若驢馬者所執皆水火羽翣斧鑿之具豫怒而叱之將滅其形彼乃詞曰弟子等歲運所生歲氣所成所遊有方所病有人隂譴至者受其災天命絶者致其死亦非弟子所敢私行始自三官五嶽上奏玉帝呈世人罪狀由是帝命行下三官五嶽行病年王案分給牒分遣某等一依定籍施行若䝉真官賜以寬貸自後願遵約束遇有行瘟見真官符籙所在即不至矣豫因依經法授以教法而去閭里病瘟者豫與之符法皆得全活豫因以此法籙救人病疾衆矣名聞遠方士庶官吏踵門救治者不可計數豫積玄功妙行皆由持誦此大洞仙經而獲大洞法籙故能全收神效立正除邪濟生度死消災延壽其俊冥冥中有大力鬼神社廟英爽來求豫誦經回施者皆謝云乘真官經力增助威德遷神善籍矣或有沉魂滯魄不得往生者託夢附形衆求豫誦經資薦者皆謝云乘經力巳出苦趣俱得更生矣應遇天行時疫侵染不止但誦此經行籙法中遺瘟符絶瘟符止瘟符天騶甲卒巳上收瘟食瘟吏收毒食毒吏收邪食邪吏收氣食氣吏收鬼食鬼吏收殃食殃吏收精食精吏治病神醫吏誅符破廟吏等九部各領甲卒及比方黑騎天官五億萬騎蒼老麻姑金剛力士等收捕之先牒年王次申岱嶽分委城隍社令劄遣瘟疫使之若拒正不伏退散聞經不依盟約然後奏而滅之夫大道尚慈太清常善上帝好生推仁止殺行經法籙者不可循私苛暴以招天譴但以禮遣之以經奉之以法籙威之以善功勸之亦方便修行之捷徑也行此經籙法之士冝在詳酌以立玄功此經尊重能解𡨚結除冡訟止譴罪釋呪詛解觸犯安墳宅寧軍府息兵甲止疫疾祈風雨降祥瑞致蠶榖保形命庇族屬救邦社安邊陲禁蟲虎止旱潦滅妖怪息群凶安奉祀典鬼神資薦先祖魂識拯濟窮魂滯魄皆可設齊誦經行道以禳謝之其餘治病馘毒有紫庭天翳神方乃禹皇金后之餘恩及乎萬世使人無夭橫之傷時免札瘥之患奉教之士當尋訪受習以取仙功子曩生吳㑹以此經功位證梵鎮如來厥後誦持不替證果太上不驕樂育天帝澄真正觀寶光慈應更生永命天尊由誦經之勤遂獲上清之貴可不深加尊敬而授之乎得受誦者勉而行之願同文昌一㑹中人齊登妙行乾道戊子秋降于鸞臺劉安賸捧至景定甲子秋再降重校正于鰲頭山摩維洞金蓮石著儀壇羅懿子捧繼後歲在玄默攝提格菊月重九日再降書于西陵桂巖衛生總真壇云度人經大洞書諸經之祖黍米珠蒼胡寶衆聖之源斯二經者同出而異名生天立地孕玄分元非誣民惑世之言乃入聖生神之要主持造化斡旋樞機言無韻麗曲無華宛故為玄奧難可尋詳真上天之所寶也自無極迄今詎容缺焉世人惟知誦度人經而不知誦大洞經蓋度人經豫曽作頌以美其意大洞經未之有也今命侍化諸子繍木宣行豫亦當作頌以彰其德庶幾觀者易曉誦者易悟也叙經意始自蒼胡檀熾音結雲成篆度天人太玄道父親求授下世方聞大洞經修真道大地凡夫學悟真仙源路杳實難尋欲知捷徑無差錯口誦心持大洞經祈祿嗣宗祖前生善力輕今生祿嗣頗艱辛禱祈欲得如君意何似勤看大洞經弭天災日月無光苦併吞星辰錯度紊天文上消天厄寧凡庶至士同宣大洞經祈風雨致田蠶旱魃為災雨若金蟲蝗水潦榖無成普教豐稔無飢饉祈禱全憑大洞經化凡庶工賈農商與四民貪求不覺業隨身忙中好割間心力習誦文昌大洞經寧府庫息兵甲府庫資財甚滿盈兵戈永息樂升平民歌有道圖長治報國勤看大洞經安奉鬼神社廟神祇與百靈欲求升擢蓋無因遷名善籍增威力旦暮須聽大洞經薦先祖眷屬宗親父母魂久留地府不超升欲思薦拔緣無力齊戒勤看大洞經除冡訟冡訟徴呼纍後人又兼譴罪在天庭生生世世遺殃咎解止宜看大洞經解觸犯安墳宅或為營修與築墳興工動土犯凶神致令宅宇多災咎解息宜持大洞經除瘟疫行病年王統五瘟遍州歷里害生民保全鄰族無傳染嚴潔同看大洞經治疾病月厄年災久染身尋翳問卜與求神不能解離無門告命道皈依大洞經拯濟沉魂滯魄六類𡨚親男女魂冥冥漠漠在幽隂普告受煉生天界好與頻看大洞經解𡨚結六道𡨚家結得深寃𡨚相報幾時停欲令各各生歡喜除是聽聞大洞經止呪詛或為爭財或為嗔一時忿恕呌神明結成鬼訟何時了解雪無非大洞經息羣凶疾病喪亡不離身官災盜賊苦侵凌財清物散如冰雪保佑當持大洞經滅妖怪木石孤狸猴犬精拋磚放火現人形作威作福求淫祀殄滅宜看大洞經開心志啓聰明士子儒生茅塞心神童應對不聰明揮毫欲得如神助先好常持大洞經保形命如幻如泡是此身氣精神裏好修真保全形命同天在熟玩文昌大洞經戒富豪莫恃家豪積萬金天司奪祿易危傾有時正好修功德割巳刋行大洞經述應驗一片真心逹上清感通得授自三神此身位證天尊果只為勤看大洞經普勸二頌聽我重言大洞經斯文玄奧果難名無邊功德莫思議普勸凡夫不可輕元始天王說大乘有緣方遇此尊經若能終始勤修誦共作文昌一㑹人清河老人頌節要三洞諸經貴玉音文章錯落粲珠金禳災辟厄生天地度盡塵沙無鞅人大道施張結洞文濟人利物極無邊凡胎欲作飛升客為我清心讀妙篇道本無聲豈有言聖人立法强傳宣求魚須是因筌力獲得魚兒豈用筌元始初傳大洞經一音初出衆知聞法燈自許時人續不但天尊與道君神風靜默海無雲天地澄間四氣清若使一緣才妄動璇璣又是不停輪日吉時良好誦經世間萬慮勿縈心濟人利物功成也玉簡金書為記名不無不有本純真非色非聲絶等倫模寫形容難到處玄中位象甚分明位極無無最上真始乎龍漢迄于今不增不減為清靜是則名為大法身諦觀符命自維宣能釋幽牢罪苦緾返本還元扶起命人人時刻得升遷罪垢皆由心境昏三塗五苦纍形魂天光一洗根塵淨仙化朝元禮至尊漸入無為得道宗一塵不染意圎通回眸下視三千界萬法都來一箇空無影無形大法身不生不滅號成真幾經劫石消磨盡寂寂神光依舊明歷盡關山道路辛這回金榜喜題名男兒志氣誰能禦駟馬榮歸自在行學道須憑慧力多清江母或漲風波融心直入丹霞外滿目戈矛奈我何九天開化本願經序比府樞相集福真君作此經乃太上金口宣說無非為救未劫設也自說經畢即奉玉㫖付玉宸內殿收貯併勑下諸天演化衆真照此傳行於是諸壇傳降逮巳八所獨紹熙靈應鴆衆鋟梓餘則騰寫轉誦而巳𣇓之民好善優於諸郡大帝開化莫甚於此邦吾主香火亦近十餘然純一不雜終始無怠惟文昌靈應頗嘉於此而傳降焉且勉善信刋板印施今幸告成噫凡顯名青編而受此經者豈非欲生之徒求免兵戈疫癘之苦者歟豫謂受經未善也必誦之而後可誦之又未善也必行之而後可行者何孝悌忠順公恕是也孝悌忠順公恕非難亦惟曰安本分三字而巳吾言如是可以消劫疑之信之吾何有焉持誦禮法凡誦經當齊沐服清淨衣入室焚香叩齒九通心拜九天存想元始天王與諸髙真七曲大帝開化仙官迂臨法會皆列虛無然後念呪淨心口神呪丹珠口神吐穢除氛舌神正倫通命養神羅千齒神却邪衛真喉神虎貴伸氣引精心神丹元令我通真思神煉液道氣長存急急如律令淨身神呪靈寶天尊安慰身形弟子魂魄五藏玄冥青龍白虎隊仗紛紜朱雀玄武侍衛我真急急如律令淨三業神呪身中諸內境三萬六千人動作履行藏前劫并後劫願身常自在常住三寶中當於劫壤時願身常不滅誦此神呪時三業悉清淨解穢神呪太一之精子東井之華卯流灌身體午蕩穢除邪酉淨如明珠子潔如蓮華卯化金光身午步雲錦霞酉登七寶殿子為真仙家午急急如九天開化主宰元皇上帝律令淨天地神呪天地混沌穢氣分葩洞中虛玄晃耀太元三清玉勑光映九衢八方威神使我自然靈寶符命普告九天乾囉怛那洞罡太玄斬妖縳邪殺鬼萬千中山神呪元始玉文持誦一遍郤鬼延年按行五嶽八海知聞魔王束首侍衛我軒凶穢蕩淨道氣常存淨壇呪太上說法時金鍾響五音百穢藏九地羣魔護騫林天華散法雨法鼓震迷沉諸天慶善哉金童撫瑶琴願傾八霞光照我皈依心早登大法橋翼侍五雲深急急如律令安土地呪元始安鎮普告萬靈嶽瀆真官土地祇靈左社右稷不得妄驚回向正道內外肅清各安方位備守帝庭太上有命搜捕邪精護法神王保衛誦經皈依大道元亨利貞急急如律令五星神呪五星列照煥明五方水生却災木德致昌熒惑消禍太白辟兵鎮星四據家國利亨名刋玉簡字録帝房乘飈扇景飛騰太空出入冥無遊宴十方五雲浮蓋招神攝風役使萬靈上衛仙翁發燼無上三天真元始三氣太上老君召出臣等身中三五功曹左右官使者捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出默想出者嚴裝關啓此間土地里域真官令臣焚香誦經之所金童揚烟靈妃散花三界真聖交集軒前伏願某誦經之後真氣周流上以保全宗社安奉帝王禳兵戈水火之災除疫病旱蝗之厄中以祝延永命保佑合門消九星八難之迍免五苦三災之纍下以落名黑簡脫籍鬼鄉七祖升仙先亡證道次祈人民異姓乘經法而萬福興隆山澤含靈感聖功而咸超道岸庶使某疾患不侵災殃掃蕩思真慕道延想丹華滌慮澄心以祈輕舉濟人利物立功為先凡有所祈克獲通感天上天下咸丐聞知願得太上十方正真生氣下降流入臣某身中令臣所啓速逹無極大道三清上聖昊天玉皇上帝梓潼神文聖武孝德忠仁王救劫大慈悲更生永命天尊御前集神呪元始大真五雷髙尊太華皓映洞朗八門五老告命無幽不聞上御九天中制酆山下鎮河海十二水源八威神呪靈策玉文召龍致雨收氣聚煙日月五星北斗七元合明天帝敕下太玄宣威三界不得稽延諸天諸地諸水諸山玉真所部溟泠大神仙王遊宴大帥仗幡天丁前祛金虎後奔玃天猛獸羅備四門所呼立至所召立前赤書煥落風火無間攝籙應命金馬驛傳太上無極總真文昌大洞仙經卷之一
