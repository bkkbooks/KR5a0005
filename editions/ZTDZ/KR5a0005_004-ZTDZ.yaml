front:
  text: 太上無極緫眞文昌大洞仙經卷之四
  hash: sha256:6a87ad7755fb5368b815abedd762fa699cc583409d7cf5c681041d68017a2104
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0005_SJB_004-010508a, image: sjb/01/010508a.png}
body:
  text: 甘山摩維洞主太玄無上上德眞君校正道言爾時元始天王眉放青毫頂旋紫炁萬華寳蓋浮羅覆形玉光金霞紆絢晃耀玉宸道君太玄道父稽首顒竚願聽洞章於是元始天王怡然嘯詠曰皇上超無景輪轉九曜生徊風混帝心八炁運常寧廣霞參神天五帝散日精液溢元中漠血凝五華平體寳圎珠映流曜拔兆形號爲壽𨓜阜亦曰澄潧渟俱濟三塗關啓籍登太明使子保仙眞七世披緑青解禍冥途下超福晨上靈世世登玉郷累祖反胎嬰洞觀無礙空始通生因明驪珠湛方瞳内外洞照清元始天王曰玉宸九天司太上大道生常保景化内九回鏡上清解帶玉映室乗素入四明擕提日中王併羽月晨靈太一召天魔帝君校萬精拔過死積炁越度仙黄庭帝立三關上八風舞神兵左把福醴液右提慶源缾洞微無障玄梵通生虚明貫顙聞十方豁落一切聲元始天王曰泰清浮絶空三天寳神符日中開五暉青帝圎常無捧籍登太明受録金華樓五藏植玉根魂魄一凝和洞空清淨玄炁通生清明定和妙明覺玄息自長生元始天王曰太極元景王三天攝神生紫素翳鬱仭安來上華京拔出五苦積返胎七元庭九玄解重結累祖樂錦清徘徊秀華下俯仰要五靈兆身昇玉堂五神回孩嬰俱躋太漠外飬素朝圎明洞虚清淨和箠通引玄明砥煉五牙珠含善味長生元始天王曰皇初紫元中暉光鬱宵明三天煥九景離合億萬生披珠巾緑霞上徊寒童靈拔出五苦毒超身過始青白素啓蕭仭金門衞朱兵七世積尸結一化百散傾受福東霞室反胎朱火庭洞靈清淨行力通自沖明淨眞手握斗足躡九元星揮執天地關精神生命根元始天王曰無英眞上玄玄元九素炁寄頻擕運珠混化啓明日正一左右仙長扶靈虚室兆有玉符籍合仙得眞炁䰟生太無中魄亦五道㑹世世解死户七祖無住滯神風吹胞樹根葉巳斷絶胎中種鬼殃五符開地結長爲神眞王應仙續萬世洞眞清淨身道通自然質眞應化現相不動住黄室應化無方在骨肉金玉實靜眞明正道至老長不易元始天王曰中央黄素炁圎華玉壽靈太張上玉門伏雲三仭明青景翳𨓜寥擕提太一精帝女抱定陵吟詠玉清經五籍編紫房五符入圎庭七祖反胎宅滅絶三途生流風斷血滯玄葉得黄寧洞玄清淨光元命靈通成性命宗本堅孝道成明王生根得太和無爲登上清元始天王曰青精上華炁太微玄景童神化玉室内飛羽𨓜紫空日爲三衿交奉符登帝墉開關把金節閉户扣瓊鍾滅魔三酆野招靈上清宫明出窮開隂入精六合房回老變皓形還白返嬰童洞源清淨光津液具神通咽液生萬神神水華池融湧升灌而潤徃來無有窮通生道之源天根常茂豐元始天王曰太陽化三晨紫軿微玄下元君保谷童守胃塞死户金符煥北華玉契拔七祖帝眞灌上生斷我三途苦洞明清淨光帝心大玄通宿命過去智根本元由中未來及他心一切無礙融洞源與洞明萬道由通生元始天王曰太初九素炁炁出華景中法垣舞仙旗逡巡五老公天人名啓珠執籍歸紫房元父左回明混㑹太微童洞清明智慧太意朗元通根塵悉消滅有無皆虚空妙行眞一全名大心神通道備登玉清位爲聖仙翁元始天王曰元始授太玄蒼胡頡寳珠檀熾鈞音妙希聲徹太虚九皇上眞炁四司大仙王飛霞散天日凝渙六合房上清朝玉虚乗景晨暉中三神號發紐捧籍啓虚皇𨓜録登紫清金符刻羽宫頂玄蒼胡頡弘濟登普光運度玄中人咽味生五芳結集成胎仙丹母金眞陽主伴合元範太易生玄郷太上元極緫眞文昌大洞仙經卷之四
