front:
  text: 太上無極緫眞文昌大洞仙經卷之二荒二
  hash: sha256:3f95d704ee84dc5e90066bef0779e1fe525519ae55a72122bd0fe3110e70874a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0005_HFL_002-001a, image: hfl/0016/0016-034.png}
body:
  text: 甘山摩維洞主太玄無上上德眞君校正祝香伏以祥風澤雨鍾靈秀於五香大德至仁鑒精誠於一縷可通無際之際是名非烟之烟憑此氤氲普伸供養一志惟恭萬神遥鑒願開金鑰仰讃瑶章伏願寳光分敷梵音朗徹死者受生生者受度無願不成天之所覆地之所承有縁悉證啓請有頌謹爲舉揚各發無上至誠心願入文昌禄嗣㑹皈依三寳諸祖師惟望慈悲常攝授仰啓三清境無上三境尊元始大法王大慈眞教主玉宸大道君大玄眞道父仰啓大羅天無上玄穹主仰啓三清界侍宸諸眞衆蒼胡頡寳珠所結大洞經妙道難思議玉章生萬神大慈元始尊金像出地户化現三神人葛衣贈金寳夢中䄂二書籙法並相授變化顯文昌隨願隨靈應臣今淨三業永斷血尸根奉符入玉京稽首黄金闕一心頭面禮元始大法王惟願大慈悲開受臣所請願臣黙想念合符帝一前越度仙黄庭俱躋大漠外七祖斷玄滯受事會玉皇願臣諷誦時百靈皆㑹集音徹通萬天流響達九地成就一切願如經所稱述從此漸進修成道事諸聖經筵諸孝友金石矢初心一禮一稱名皈依七曲主注想始青天先天長壽毋法想紫雲巖文昌眞國土後天慈父母化現桂香宫孝子及慈孫列仙侍慈容願受眞信禮放大如意光隨心隨夢應嗣禄互儲祥願我侍慈親生生榮鶴髮願我逢聖時歩歩榮寵渥願我處生方隨念如意光願我善縁熟學道早悟眞願我業垢空惟心逹淨土普與人天衆量縁證善果金石一眞心眞心皈帝君諸聖諸天尊心香同讃祝願與諸經生一心皈命禮至心皈命禮玉清聖境清微天宫鬱羅蕭臺之中森羅浄泓之上現有爲之梵相具无極之神通敷演眞玄破無有色空之礙拯提趣類絶智愚高下之分妙用難窺靈機罔測大悲大願大聖大慈无量度人元始天尊至心皈命禮上清眞境禹餘天宫紫微瓊䑓之中玄都玉京之上接元始虚皇之統系超西那玉國之根苗入黍米珠盡挹眞玄之精粹在香林苑屢談秘要之筌蹄妙德難思神通莫議大悲大願大聖大慈无量度人靈寳天尊至心皈命禮太清仙境大赤天宫巍巍金闕之髙渺渺重霄之上降生於无量數劫說法於萬二千天五千袐言融三才之妙道八十餘度接六趣之衆生聖德崇髙玄功廣博大悲大願大聖大慈无量度人道德天尊至心皈命禮紫金金闕白玉玉京住妙有之境中處玄眞之天上功成道備故妙道卓冠於諸天心廣體胖故慈光遍燭於三界位尊而上極無上道妙而玄之又玄眞聖宗師天人依仗大悲大願大聖大慈穹蒼聖主玉皇天尊至心皈命禮股肱佐漢家世相韓掉三寸舌而爲帝者之師受一編書而作人中之傑身不勞於汗馬功巳著於丹書向遇黄石公即根本神仙之地後從赤松子乃飛昇大有之庭眷隆上相之尊嚴位正天樞之鎭重啓三洞眞經之詳演膺九光寳節之榮襃萬古敷揚諸天賛重大悲大願大聖大慈校經主宰道髙聖邁上上大德尊天帝法主道君天尊至心皈命禮北上太虚無上常融天寂虚玄梵境太乙眞慶宫眞玄上聖九天遊奕使左領天罡北極右垣大將太極眞宗太玄慈父靈通大妙仙八威九光聖執乾元帝心印秉隂靈斗極符總玄武右弼司判左領聖府院誓斷妖魔救護羣品匡扶劫運統攝萬靈威德無邊神通浩漙巡遊十洞檢察諸天福佑孝忠勦除孽害至聖至神至帥鎭天眞武治世福神玉虚師相紫皇天乙眞君玄天仁威精微上帝金闕化身天尊至心皈命禮甘山福地摩維洞天中有老人一炁恨紫微之應化上朝金闕九華通碧落之生芒說六章經陶凡煉聖之文賛萬壽觀復古通今之化扶持人極發越地靈道大難名功髙莫議大仁大孝大聖大慈儲福定命九天丈人大玄无上上德眞君玄眞萬福天尊至心皈命禮本來南土上泝蜀都先獲黄帝九𣇓之丹書後事老君兩度於玉局千軸得修行之要一時成吐納之功法籙全成受盟威品而結璘訣正邪兩辯奪福庭治而化鹹泉德就大丹道齊七政大悲大願大聖大慈三天上相玄都丈人扶教度人天師正一輔元體道沖玄神化靜應顯佑眞君六合無窮髙明大帝降魔護道天尊至心皈命禮永平柱史唐代易玄得異術以全神脫塵囂而猒役主光華之大法悟萬有之眞機道骨常仙留馬躍入淵之跡恕心決獄致䑕飛穿牖之祥受赤龍丹號碧梧子大悲大願大聖大慈三天次相九炁丈人丹琳大帝隨機演化天尊至心皈命禮誕生漢室錫號晉朝惟布炁以降邪曽吞虎而救世管玉霄洞清之法傳玄壇内教之經掌雷府刑判都督府便冝之事領天師職升紫微天右相之班判洞陽宫主混元教大悲大願大聖大慈無極眞元清皇上帝九天保册司命天尊至心皈命禮德彰巴峽跡隱渝江㓜題金榜之姓名親授玉階之冕服止殺應霜臺之夢現威變日表之容悟最上乗以勸善大師而友助究眞常道假恭天觀主以講磨膺仁濟之裒嘉表神功之莫測鎭國祚復興之地開蜀民再造之天恩被羣生德隆百世大悲大願大聖大慈璧山顯應眞人清明河童天帝至心皈命禮聖祖母十月初五日誕始青天上元命化初一炁未漓含七曲眞元之粹九天肇始包三光精體之全鸞機無兆眹之可名鶴質仰清髙而莫議先天先地之慈母不古不今之婉容陽回十月五日之春教演三綱五常之祖壽綿長壽形賦元形載觀本行集之跋經莫測始青天之證道大慈大願大聖大慈七曲初劫賦形長生壽毋太極元君至心皈命禮聖父二月十一日誕桂香寳殿文昌上宫道體混成含九十餘生之化眞元未露儲三萬六千之精開後天不老之鸞書奉青霄莫測之熊夢神父之大慈父至人之上善人脉壽三綱五常之根心包百行萬善之體皈依莫盡稱讃何忘大悲大願大聖大慈七曲聖父顯慶慈祐仁裕令德王玄初大帝證果長壽王菩薩儲眞衍慶天尊至心皈命禮聖母七月初七日誕桂香内殿文昌輔宫淑質春和含太眞之淑氣清光秋湛蘊七夕之清輝包龍像於未漓隱鸞機於不露劔泉之大慈母蓬萊之上善人産萬世之綱常生九天之名教皈依莫盡稱讃何忘大悲大願大聖大慈七曲聖母昭德積慶慈懿恭惠太后證果寳光菩薩嗣慶儲祥元君至心皈命禮元皇天帝二月初三日誕桂香寳殿文昌上宫九十六生種善果於詩書之圃百千萬化培桂根於隂隲之田自雷杼炳靈於鳯山至如意儲祥於鼇岫開人心必本於篤親之孝壽國脉必先於致主之忠應夢保生垂慈憫苦不驕帝境玉眞慶宫現九十八化之行藏顯億千萬劫之神異飛鸞開化在在建壇助國救民人人被德功存乎儒道釋教職盡乎天地水官威靈不可度量功德果難思議至仁至孝不樂不驕大聖大慈大悲大願神文聖武孝德忠仁王安樂不動地遊戲三昧定慧王菩薩證果迦釋梵鎭如來救劫大慈悲更生永命天尊至心皈命禮聖后五月初三日誕桂香内殿文昌輔宫懿範冰清掬九天之霽月仁心春粹扇七曲之家風婉儀入侍於親關慈淑天全於毋道上下一堂之和氣古今萬世之春臺應夢儲祥因心演化大仁大孝大聖大慈七曲聖后恭順淑應德惠昭懿皇后證果定應菩薩冲和洞妙元君至心皈命禮聖長子三月初三日誕桂香内殿文昌輔宫聖德慈祥一念嗣家聲之脉神功顯著九天寛帝父之心戯綵雲巖詳無體無聲之禮樂問安月窟傳有典有則之箕裘錫五福於生生仁孝之家榜三元於奕奕詩書之裔因心立教應夢儲祥至仁至孝至聖至慈聖長子嗣德履孝王演化清微天帝文昌衍慶眞君至心皈命禮聖長婦八月初一日生桂香内殿文昌輔宫淑質春柔粹婉容於侍問眞心玉潔儼懿範之清髙相成震長之家聲黙識兊和之閫則教流愷悌化洽沖和應夢儲祥因心錫慶至仁至孝至聖至慈聖長子婦善助顯懿循孝夫人元眞妙洞眞妃文昌靜應天君至心皈命禮聖次子正月初一日生桂香内殿文昌輔宫父子一家全克孝克慈之道君臣千載盡止仁止敬之心模範人天本綱常而立教凖繩世道根詩禮之趍庭幹蠱於隂隲之夭福謙於行藝之圃因心演化應夢儲祥至仁至孝至聖至慈聖次子冒德立孝王演化妙成天帝文昌司禄眞君至心皈命禮聖次子婦二月十八日誕桂香内殿文昌輔宫孝德謙柔禀一元之淑質眞心坤順婉七曲之閨儀五婦嶺前揭問安之華典三潮水上流積慶之清源應夢儲祥因心演化至仁至孝至聖至慈聖次子婦助順惠懿克孝夫人玉眞洞應眞妃文昌嗣慶天君至心皈命禮懿孝公主四月十六日誕桂香内殿文昌輔宫蟾魄凝祥根父天之慈愛鸞心飮福陶母德之雍和霜姿雪質之清不物於物春風秋月之抱自天其天内觀萬境之空㓜得九天之道心清莫議德婉難名至仁至孝至聖至慈聖女淑眞妙靖懿孝公主洞元眞人文昌萬壽天君至心皈命禮聖長孫七月初三日誕桂香内殿文昌輔宫澟澟天姿道矩肅家聲之粹挺挺風烈仁聲流化治之新雷霆間發於春和人人開悟雨露旁周於天表物物生成應念儲祥炳靈應夢至仁至孝至聖至慈聖長孫紹應昭靈至孝侯寳華圎滿天君文昌積慶眞人至心皈命禮聖長孫婦正月二十八日誕桂香内殿文昌輔宫聖質天姿粹出春風之抱仙標道矩豁開秋月之清四世一堂印印閨儀之雍肅百行萬善天天家慶之精詳應夢炳靈隨機演化至仁至孝至聖至慈聖長孫婦淑應昭孝夫入玄眞靜素文昌積慶天君至心皈命禮聖次孫十月十三日誕桂香内殿文昌輔宫談笑春風字字仁心之發育動容和氣言言家法之流傳子承聖子之心根培隂隲孫繼神孫之體果證眞仙應夢儲祥因心立教至仁至孝至聖至慈聖次孫承應宣靈順孝侯祖德妙清天君文昌襲慶眞人至心皈命禮聖次孫婦七月二十三日誕桂香内殿文昌輔宫玉質金姿父母熟㘽培之地恩光化日子孫綿嗣續之天生根榮隂隲之根内資相警休命續衣冠之命婉出相成應夢儲祥隨機演化至仁至孝至聖至慈聖次孫婦惠應體孝夫人眞元育粹文昌襲慶天君至心皈命禮文昌佐神太一眞官天順眞君三茅司命眞君文班左司主䘵獨孤大王武班右司主嗣英惠忠烈翼濟福安王雙松報喜太尉桂禄二籍仙官仙童玉女飛鸞從駕天聾地啞侍駕左右三仙北府賛佐碧玉醮筵雲雷雨部諸仙列聖輔道一切眞宰禮讃巳周依光懴悔七曲慈尊眞教主慈父慈母同我生子生聖子皆孝慈孫繼神孫盡慈孝一家和氣天無盡萬世春臺月有光慈光普照諸天人細入微塵滿天地我生同得乾坤體一似文昌始劫時聖非自聖凡自凡流浪至今方覺悟願逢七曲慈尊教惟忠惟孝惟慈心不以口業傲神人不以身業累父毋不以意業欺天地不以心業禍子孫願從孝行與隂功種種力行諸方便懴贖多生諸罪垢皈依元皇大慈光求嗣求禄求生方不求諸人求諸已惟我文昌七曲師歷劫待人存恕法願放一種如意光憫念衆生眞懴悔懴悔巳周次當發願父母願同長壽果龜齡鶴髮映慈光已身願拜大吉祥仰事俯育無苦惱子孫願嗅雲巖桂嘉與已身同發榮父慈子孝一家春光明無負慈尊教願蒙七曲親提接指引登眞入道門捨生受生正遍知盡未來世俱圎滿發願巳周次當讃頌桂香殿上仁孝主教雨周流洗業根業根化作桂華香善本種成長壽果一家骨肉無煩惱七曲子孫同護持普願今世與來生紫雲巖前成道果歩歩心心帝左右生生世世天主張骨凡身換形可灰一點眞心自金石發如是願者是日爰有本貫弟子某稽首元始天王千眞萬聖持誦大洞仙經丐賜赦過宥罪改禍成祥惡根斷絶進道無魔祖先父母早度南宫獲生中土眷縁衆生均頼陶鎔災殃殄滅所伸凡懇千胃天威願冀感通曲從所請伏願香火使者領茲丹懇普爲關聞稽首皈依三清應化天尊玉清普化天尊太乙救苦天尊天樞上相法主道君天導終劫濟苦天尊消災解厄天尊雷聲普化天尊玄眞萬福天尊斗府天曹列位星君三元三官大帝三百六十應感天尊定光澄明普度天尊紫清介福天尊更生永命天尊無量度人天尊普天懴罪天尊十方靈寳天尊不可思議功德當願衆生心開悟解受持轉誦元皇全號金闕上相檢校太師混元内輔三清上宰大都督府都統三界隂兵行便宜事管天地水三界獄事收五嶽四瀆眞形虎符龍劵緫諸天星曜判桂禄嗣籍上仙英顯元皇眞人司禄職貢舉眞君洞照通眞先生編修飛仙列籍掌混元造化輪廻六道救苦救難慈尊玉清内境清靜道眞身現紫雲巖手持如意杖統御萬靈漙濟諸苦大仁大孝大聖大慈無上不驕樂育天帝都統混天誠心接物萬天教主隨願慈應天尊九天定元保生扶教輔元開化文冒度入主宰長樂永佑靈應大天帝君掌五湖四海緫十二河源水府運使定慧王菩薩證果迦釋梵鎭如來澄眞正觀注禄定籍寳光慈應治世顯道保安拔罪更生永命扶善濟苦消劫行化純一顯應天尊太上元極緫眞文昌大洞仙經卷之二
