front:
  text: 太上無極總真文昌大洞仙經卷之三第四同卷
  hash: sha256:ae9338844cf8ad80a0ee634d9b88d4b3827e1ae288b0293002f477eda3e6a765
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0005_HFL_003-001a, image: hfl/0016/0016-066.png}
body:
  text: 甘山摩維洞主太玄無上上德真君校正玄藴呪玄元始氣分清華開洞神靈風回太和玉音攝流精至哉本自然誰識此玄文堅剛明一悟倐忽超三乘寂寂無色根永劫奚漂沉胡能精修持究竟登玉清道言昔在龍漠劫初元始天王出大洞玉經於高上大有玉清宫演太玄重玄玄一之道命之曰大洞仙經元始天王始以太玄一音液響玉清弘帝一真道說大洞寶文示九統之法傳九光之符至士誦之登齊修行即得萬神歡慶百靈護持萬聖感格萬仙翕臨可以飛度三災四煞五鬼六害七傷八難九厄十惡登仙入聖神生紫微自然無為不係隂陽五行六氣之所拘束念念增長趣入大乘弘之無窮諸天下觀玉帝降鑒飛天保迎億曹萬祖歷劫種親遊爽飛魂俱得更生世胄接仙長為貴人功滿道備骨肉同升乘龍駕雲上朝玉清元始天王嘯詠太玄凝神遐想而說洞章髙上洞元元生九天氣祖太無宗風胤玄玄曹絶散四清撫間帝一上景連衆攝烟長契一運七世投間託靈屬命反華自然泯邈流輝六曜沉遷陵範御暉西華彰安併編帝簡盡得解源胎田邃路世發玉蘭靈光八輝混生萬神元始天王曰玉虛順玄歸天晨金宵遊朗朗生帝景歘爾宴玉洲左攝始童神右命起恆符明真煥九霄三日映玄敷干景併三襟內有幽寥無令我得長年千却始一周黃籙保德仞披錦入神丘太一務命根公子召合符十回度初心得入大信根元始天王曰玉帝玄上幡制命九天階七覺成道數歡熙神風回飈燦北停華紫英唱東瓊琳和九霄外玉符徴太微三素生泥丸發曜金靈暉老君牢張上守衛死節機十善生玄中度厄而自然元始天王曰太冥絶九玄洞景寄神通玉帝乘朱霄緑霞煥金墉上館雲珠內仰接玄仭峯靈關太漠下靄沫竟沖空冥化混離坎玄玄叔火王瑋寂髙同生無極保谷童圎塗無凝滯綺合有九重南披七祖根西解纍劫凶體矯萬津波神生攝十方大歸反胎轅三合乘天龍元始天王曰太微天帝宫八浮入雲營神宗理靈襟龍山秀玉京金房鬱明霞九户朗髙瓊黃庭涉北元元父左回明朱晶啓明師幽廖登上清四玄秉元禁長保五帝城元始天王曰紫精太無中三元上景衢秀朗保太暉眇眇扇帝敷伯史啓三素帝靈登玉虛慶氣育五雲司命神明初十華妙行仙制魔生六明元始天王曰真陽帝賔老受事會玉皇滅魔除穢水百司詣絳宫逸宅丹玄內五氣結十方七轉司命至三回召仙公泰山主鬼者急校三宫中十德初成墓同飛七覺元元始天王曰太素三華氣晨登廣靈堂玉賔表玄籍守命孩道康徊風散萬魔金符召廣鄉輔衛地户內保此長生王轉入十仙門八景齊洞陽元始天王曰紫精育華林長瞑太無外玉房生寶雲九扇胞胎內帝賔奉五符三光回紫蓋蒼玉斌來生衛此長夜會五靈度符籍九統合九光三玄出太清紫陽發萬生玄精育九靈元父結胎仙元始天王曰青靈扇八氣鼓輪三華城拔兆胞胎結七世受福生宿對滅五道長守帝一營公子執五符太一居紫房三合地户下拔命玉帝宫少女郁墨子衛兆七氣窗拘制盟血液盈滿五藏充十真登黃房帝子化金仙白玉飛符招引升龍臺天元始天王曰髙上宴紫霄五老輔玉根太素拂眇景合符帝一前白帝皓鬱將回金太霞鄉度我死户下拔出三途梁十通由斯生妙行由此興洞明光景中帝一真玄玄太上無極總真文昌大洞仙經卷之三
