front:
  text: 太上元極總真文昌大洞仙經卷之五荒四
  hash: sha256:b3b36e11869810199cbb3cc5baf4b0b79e76b5fa4ceca417da71e53d6fdd2a07
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0005_HFL_005-001a, image: hfl/0016/0016-086.png}
body:
  text: 甘山摩維洞主太玄無上上德真君校正道言爾時元始天王以大洞髙上混沌太無元天寶玉皇之氣結一寶珠命之曰蒼胡頡曰吾以此寶珠從道妙一善貸生根孕玄分元誕始傳真化生諸天凝成萬氣大哉至寶惟我獨存今為玉宸道君重出欺寶諸天帝王天真大聖瞻望寶光其光分敷百千萬億結成大洞仙經玉文凝而成雲絢而成章諸天帝王天真大聖以清明識以始通觀以華舌通齊聲宣詠大洞雲章響徹萬天流響九地天界地界水界神鄉一切神靈不離本坐俱覩雲章絢目仙梵歷耳皆悉百生障滅萬劫塵消三塗九幽十方惡趣咸承光音所及十纒九結六染七塵於是頃間一時解脫是時太玄道父前諸蕭臺再拜稽首求受寶珠所結大洞仙經玉文雲章庶以導化人天衆生俱免萬災咸消衆罪不沉惡趣俱等一乘弘是願言殷勤啓請元始天王命元神大聖玉宸道君具俯仰威儀手付太玄道父蒼胡頡寶元始天王告曰此蒼胡頡寶與檀熾鈞音若非太玄何得求請唯子慈深願重可界寶章元始天王曰天皇上真氣三元乘晨回法垣興朱霄帝晶啓玉扉拔尸命門內解結桃康階斂神保五籍越轉入太微單入而雙修一曲水天開海日自東生元命生太初元始天王曰太一生元氣日中司命童煥然神光明披霞升帝墉列坐震靈席混合五日房白氣育上生青君安延昌左擕精上門右抱合和嬰我生日月華友賔赤氣王八景照泥丸朗然洞房中嬰兒為赤子混離生玉容五道秀金華位為上清公七祖斷玄滯身得乘神風徘徊玉清上和樂反嬰童太始三氣周真文肇生明元始天王曰元虛黃房內中有黃寧童左有堅玉君右有帝昌皇浮清翳神氣蔚蔚虛靈容青肝明輪子開朗徹入窗太一壽丘蘭奉符入玉宫拔我七世罪回元期十通混合帝一室五老變孩蒙太素梵行初一善四金通元始天王曰太極主四真凌羽逸上清七轉召司命太一揚威明司録促詣位三舉登震靈魔王來受事仙官束鬼精月中青帝毋號曰芬艷嬰太張上五符安來上玉名混化六合內洞房列火兵太極五靈沖橫文帝子賔元始天王曰斗中四真人散花玉清臺帝𡖖中玄生一徊衆真來香風扇三寶五藏映清夷蒼胡頡光華檀熾鈞吉祥太中六氣清曲水襄天河六度功圎成五魔伐六隂中結元始王髙觀六合庭元始天王曰晨中黃景氣三秀登霄庭滄臺飛羽輪延迎道巳成司命奉帝書號為玄度卿保生太霞宫列賔館上清命門合精延守我身黃寧左擕元素君右攝朱鬱靈太和度七覺點火生真文紫華領胎仙元命真中神元始天王曰金闕上景氣十方暉紫煙三命太一帝五召太平神七轉招嶽真玉符告三官拔籍三靈下受生髙上晨太帝八靈王一化回慶玄桃君守六合勒精衛泥丸太清八景觀十德真文宣保子神中神元命生自然元始天王曰太虛空無景霞中有彭室九雲合重扉帝君靜幽密八真合景君上擕女太一雌雄混玉房九變還得七分形散六合泥丸易分别太真九光輪十佺丿文結保子元氣通五氣理中頡混一歸帝闕永壽無終劫變化飛上清三千行超越元始天王曰太玄九氣上煙回大暉間神光秀空峯五道煥三天駕景登絶霄乘風蕩滯神中一日運珠理心入清間混合三五宫纍變億萬年伐絶胞樹生永斷血尸根七祖散積滯返華黑幽玄萬氣生萬神齊仙成仙王太玄啓十明妙行登十真元始天王曰上清絶霞外八皇運九天幽寥生帝宇擕此景中人晨登太老寢夕宴金華軒羽節命太一錦旗招萬神堅我六府胎伐滅胞樹根解結生七祖散禍寧九玄赤帝丹靈峙扶兆入玉門月母靈素蘭守閉死氣關死氣自今絶生津從茲延萬神萬氣仙超脫位真王十真妙行全太玄會明陽無上大洞尊一氣同龍光元始天王曰東華發始暉髙晨映上清煥洞圎珠藹朗朗紫曜明七神回帝席五老飛玉軿太一景中立司命攝萬精泛然雲波間寂盻泥九城七轉召三官北君稽首靈五嶽應氣到拔死書長生三舉震靈符玄解大魔精七祖解血結玄華保黃寧元始天王曰太帝九老京校仙登扶桑七轉召天帝司命乘神綱五嶽啓靈戶傳聲大魔王河海皆受事立爾應會方保符泥丸內守神曰桃康回明易死籍記仙叔火王拔絶三途疾去禍生上英七玄登朱室兆身會玉堂上友方盈子下擕理維藏左攝明車君右輔歸盛昌混一玉京氣化兆吉以昌反嬰元命童擅熾吉祥鈞天一元根仙自在光明輪元始天王曰玉清萬華宫髙仙藏帝經主圖九天表洞觀無中生七轉召萬神五嶽一來庭三官招衆魔司録校所呈拔籍重泉曲記仙書上清元始天王曰玄洲絶三津羽景太無庭回霄飛埀漠委化混萬精五雲蔚絶空七霞落圎明朗朗幽寥子梵昌濟黃寧五老揮絳華散香擕玉靈金質濯帝川緑煙靄流瓊神拔三塗積仙胎結兆形上清玉皇師玉宸大道君與心絳宫神飛澄太玄尊元始天王曰三真生太元玉戶映晨華太素洞元虛丹林森朱柯回神九重府南昌發瓊華百關納津液停玄三秀阿兆身騰玉清七祖離幽扃長保不終劫萬世成仙家位為聖統尊玉清大洞神元始天王曰西元九靈氣金丹流雲宫上極璇曜抄暉景太霞中動回九天輪靜沉八流綱室有胎仙毋擕襟太帝皇玄一靈時生三老素牢張左把兆符籍右擕理神宗同登琳龍闕稽首玉清房拔棄死滅根飬形三五中七祖解尸結受福明珠方上證聖中尊符化元氣王玉宸道君言我師元始天王授我此大洞仙經其旨玄奧修真妙門初定通息太和一千中觀變真離相消塵元合五千坐在立亡大定全真妙行通靈初曰通氣次曰通神終曰通靈十通成真道備登宸超脫飛升過度三界往來三清證品太洞天一帝尊六度十通萬行圎成千和萬合自然至尊太上元極總真文昌大洞仙經卷之五
